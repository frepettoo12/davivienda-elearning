<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo Agente · Davivienda</title>
  <style>
    :root { --red:#DA291C; --yellow:#FFD700; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f4f4f6; color: #1a1a1a; }
    header { background: var(--red); color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    header b { font-size: 17px; }
    header .tag { background: rgba(255,255,255,.18); padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    main { flex: 1; display: grid; grid-template-columns: 420px 1fr; min-height: 0; }
    /* Panel izquierdo */
    .left { display: flex; flex-direction: column; border-right: 1px solid #ddd; background: #fff; min-height: 0; }
    .composer { padding: 14px; border-bottom: 1px solid #eee; }
    textarea { width: 100%; height: 90px; resize: vertical; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font: inherit; font-size: 14px; }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    select { padding: 8px; border: 1px solid #ccc; border-radius: 8px; font: inherit; }
    button { background: var(--red); color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: .5; cursor: default; }
    .progress { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 13px; }
    .ev { padding: 6px 0; border-bottom: 1px solid #f2f2f2; display: flex; gap: 8px; align-items: flex-start; }
    .ev .ic { width: 18px; text-align: center; flex-shrink: 0; }
    .ev.text { color: #1a1a1a; }
    .ev.tool { color: #555; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .ev.tool .nm { color: var(--red); font-weight: 600; }
    .ev.result { color: #0a7d28; font-weight: 600; margin-top: 6px; }
    .ev.error { color: #b00; font-weight: 600; }
    .hint { color: #999; font-size: 12px; padding: 4px 0; }
    /* Panel derecho: preview */
    .right { display: flex; flex-direction: column; min-height: 0; }
    .preview-bar { padding: 8px 14px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .preview-bar .dev { margin-left: auto; display: flex; gap: 6px; }
    .preview-bar .dev button { background: #eee; color: #333; padding: 5px 12px; font-size: 12px; }
    .preview-bar .dev button.on { background: var(--red); color: #fff; }
    .frame-wrap { flex: 1; overflow: auto; background: #dadce0; display: flex; justify-content: center; padding: 18px; }
    iframe { background: #fff; border: 0; box-shadow: 0 4px 20px rgba(0,0,0,.15); transition: width .2s; }
    iframe.desktop { width: 100%; height: 100%; }
    iframe.mobile { width: 390px; height: 100%; }
  </style>
</head>
<body>
  <header>
    <b>🤖 Modo Agente</b>
    <span class="tag">Claude Agent SDK · local</span>
    <span class="tag" id="status">listo</span>
  </header>
  <main>
    <div class="left">
      <div class="composer">
        <textarea id="instr" placeholder="Ej: Hacé el header sticky y arreglá el overflow en mobile…">Hacé el header sticky, agregá el meta viewport que falta y arreglá el overflow horizontal en mobile. Mejorá la estética manteniendo la marca Davivienda.</textarea>
        <div class="row">
          <select id="model">
            <option value="claude-haiku-4-5">Haiku 4.5 (económico)</option>
            <option value="claude-sonnet-4-6" selected>Sonnet 4.6 (recomendado)</option>
            <option value="claude-opus-4-8">Opus 4.8 (máxima calidad)</option>
          </select>
          <button id="run">Ejecutar agente</button>
        </div>
      </div>
      <div class="progress" id="progress">
        <div class="hint">El progreso del agente aparecerá acá en vivo (lee archivos, edita, renderiza, se autocorrige).</div>
      </div>
    </div>
    <div class="right">
      <div class="preview-bar">
        <span>Preview:</span>
        <code>/workspace/index.html</code>
        <div class="dev">
          <button id="d-desktop" class="on">🖥 Desktop</button>
          <button id="d-mobile">📱 Mobile</button>
          <button id="reload">↻ Recargar</button>
        </div>
      </div>
      <div class="frame-wrap">
        <iframe id="frame" class="desktop" src="/workspace/index.html"></iframe>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const progress = $("progress"), frame = $("frame"), statusEl = $("status");

    function addEv(cls, ic, html) {
      const div = document.createElement("div");
      div.className = "ev " + cls;
      div.innerHTML = `<span class="ic">${ic}</span><span>${html}</span>`;
      progress.appendChild(div);
      progress.scrollTop = progress.scrollHeight;
    }
    function reloadPreview() { frame.src = "/workspace/index.html?t=" + Date.now(); }

    // viewport toggle
    $("d-desktop").onclick = () => { frame.className = "desktop"; $("d-desktop").classList.add("on"); $("d-mobile").classList.remove("on"); };
    $("d-mobile").onclick  = () => { frame.className = "mobile";  $("d-mobile").classList.add("on");  $("d-desktop").classList.remove("on"); };
    $("reload").onclick = reloadPreview;

    $("run").onclick = async () => {
      const instruction = $("instr").value.trim();
      if (!instruction) return;
      const model = $("model").value;
      $("run").disabled = true; statusEl.textContent = "trabajando…";
      progress.innerHTML = "";
      addEv("text", "▶", "<b>Instrucción:</b> " + instruction.replace(/</g,"&lt;"));

      try {
        const resp = await fetch("/agent/edit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ instruction, model }),
        });
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          // parsear bloques SSE separados por \n\n
          let idx;
          while ((idx = buf.indexOf("\n\n")) >= 0) {
            const block = buf.slice(0, idx); buf = buf.slice(idx + 2);
            const ev = (block.match(/^event: (.+)$/m) || [])[1];
            const dataLine = (block.match(/^data: (.+)$/m) || [])[1];
            if (!ev || !dataLine) continue;
            let d; try { d = JSON.parse(dataLine); } catch { continue; }
            handle(ev, d);
          }
        }
      } catch (e) {
        addEv("error", "✗", "Error de conexión: " + e.message);
      } finally {
        $("run").disabled = false;
      }
    };

    function handle(ev, d) {
      if (ev === "init") addEv("tool", "•", `sesión <code>${d.sessionId.slice(0,8)}</code>`);
      else if (ev === "text") addEv("text", "🤖", d.text.replace(/</g,"&lt;").replace(/\n/g,"<br>"));
      else if (ev === "tool") {
        const ic = d.name === "Bash" ? "⌨" : d.name === "Read" ? "👁" : d.name.match(/Edit|Write/) ? "✎" : "⚙";
        const det = (d.detail||"").split("/").pop().slice(0,60);
        addEv("tool", ic, `<span class="nm">${d.name}</span> ${det.replace(/</g,"&lt;")}`);
        if (d.name === "Bash" && /screenshot/.test(d.detail||"")) statusEl.textContent = "renderizando…";
      }
      else if (ev === "result") { addEv("result", "✓", `Listo · ${d.toolCalls} acciones · $${(d.costUsd||0).toFixed(4)}`); }
      else if (ev === "done") { statusEl.textContent = "listo"; reloadPreview(); }
      else if (ev === "error") addEv("error", "✗", d.message.replace(/</g,"&lt;"));
    }
  </script>
</body>
</html>
