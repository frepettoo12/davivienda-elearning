<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Techo amarillo/naranja -->
  <ellipse cx="50" cy="35" rx="48" ry="28" fill="#F5A623"/>
  <!-- Chimenea -->
  <rect x="70" y="12" width="10" height="15" rx="2" fill="#DA291C"/>
  <!-- Casa roja -->
  <path d="M15 38 Q50 20 85 38 L85 88 Q50 95 15 88 Z" fill="#DA291C"/>
  <!-- Contorno negro de la casa -->
  <path d="M15 38 Q50 20 85 38 L85 88 Q50 95 15 88 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Puerta amarilla con marco azul -->
  <ellipse cx="50" cy="75" rx="14" ry="18" fill="#3B82F6"/>
  <ellipse cx="50" cy="75" rx="10" ry="14" fill="#F5A623"/>
  <!-- Punto de la puerta -->
  <circle cx="56" cy="75" r="2" fill="#1a1a1a"/>
  <!-- Ventanas -->
  <rect x="28" y="50" width="12" height="12" fill="#3B82F6" rx="1"/>
  <rect x="60" y="50" width="12" height="12" fill="#3B82F6" rx="1"/>
  <!-- Triángulos en ventanas -->
  <polygon points="34,50 28,56 40,56" fill="#1a1a1a"/>
  <polygon points="66,50 60,56 72,56" fill="#1a1a1a"/>
  <!-- Base azul -->
  <path d="M15 88 Q50 95 85 88 L85 92 Q50 99 15 92 Z" fill="#3B82F6"/>
</svg>
